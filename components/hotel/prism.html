<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRISM 智能评论管理系统演示</title>
    <!-- 使用 Tailwind CSS 进行快速样式渲染 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入动画库 -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
      body {
        scroll-behavior: smooth;
      }
      .snap-container {
        height: 100vh;
        overflow-y: scroll;
        scroll-snap-type: y mandatory;
      }
      .snap-section {
        scroll-snap-align: start;
        min-height: 100vh;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
    </style>
  </head>
  <body class="bg-slate-50">
    <div class="snap-container" id="main-scroll">
      <!-- 封面部分 -->
      <section
        class="snap-section bg-slate-950 flex items-center justify-center relative overflow-hidden"
      >
        <div
          class="absolute inset-0 opacity-10 bg-[grid-white/10] [mask-image:radial-gradient(white,transparent)]"
        ></div>
        <div class="text-center z-10 px-6">
          <h1
            class="text-7xl md:text-9xl font-black text-white mb-6 tracking-tighter"
          >
            PRISM
          </h1>
          <p
            class="text-xl md:text-2xl text-blue-400 mb-8 uppercase tracking-[0.3em]"
          >
            PARC 2.0 架构演示
          </p>
          <div class="h-px w-24 bg-blue-500 mx-auto mb-8"></div>
          <p class="text-slate-400 italic max-w-xl mx-auto">
            “评论不是静态文本，而是持续重塑我们对空间认知的数据信号。”
          </p>
        </div>
      </section>

      <!-- 架构说明 -->
      <section
        class="snap-section bg-white flex flex-col items-center justify-center p-10"
      >
        <h2 class="text-4xl font-bold mb-12 text-slate-900">
          核心架构：双层算法闭环
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-5xl">
          <div class="p-8 bg-slate-900 text-white rounded-3xl shadow-2xl">
            <h3 class="text-xl font-bold mb-4 text-blue-400">
              引擎 A: 智能追问
            </h3>
            <p class="text-slate-400 text-sm">
              通过陈旧度监测与盲区识别，以最小负担换取最高价值的信息补全。
            </p>
          </div>
          <div class="p-8 bg-slate-50 border border-slate-200 rounded-3xl">
            <h3 class="text-xl font-bold mb-4 text-blue-600">
              引擎 B: 平台更新
            </h3>
            <p class="text-slate-500 text-sm">
              将碎片化反馈语义内化，沉淀为结构化的酒店属性资产。
            </p>
          </div>
        </div>
      </section>

      <!-- 衰减模型 -->
      <section
        class="snap-section bg-slate-50 flex flex-col items-center justify-center p-10"
      >
        <h2 class="text-4xl font-bold mb-6 text-slate-900">
          健康度监测：衰减曲线
        </h2>
        <p class="text-slate-500 mb-12">
          不同属性具有不同的半衰期（如：清洁度 vs 交通）
        </p>
        <div
          class="w-full max-w-3xl bg-white p-10 rounded-3xl shadow-lg border border-slate-200"
        >
          <div
            class="flex justify-between items-end h-64 border-l border-b border-slate-300 relative"
          >
            <!-- 模拟曲线 -->
            <svg
              class="absolute inset-0 w-full h-full"
              preserveAspectRatio="none"
            >
              <path
                d="M0,0 Q150,200 600,250"
                fill="none"
                stroke="#ef4444"
                stroke-width="3"
              />
              <path
                d="M0,0 Q300,100 600,150"
                fill="none"
                stroke="#3b82f6"
                stroke-width="3"
              />
            </svg>
            <div class="absolute bottom-2 right-2 text-[10px] text-slate-400">
              时间 (天)
            </div>
            <div class="absolute top-2 left-2 text-[10px] text-slate-400">
              陈旧度
            </div>
          </div>
          <div class="flex gap-4 mt-6 text-xs justify-center">
            <span class="flex items-center gap-1"
              ><i class="w-3 h-3 bg-red-500 rounded-full"></i> 清洁度
              (7天)</span
            >
            <span class="flex items-center gap-1"
              ><i class="w-3 h-3 bg-blue-500 rounded-full"></i> 设施
              (30天)</span
            >
          </div>
        </div>
      </section>

      <!-- 结尾 -->
      <section
        class="snap-section bg-blue-600 flex flex-col items-center justify-center text-white"
      >
        <h2 class="text-5xl font-black mb-6">准备好升级了吗？</h2>
        <p class="text-blue-100 mb-12">
          PRISM / PARC 2.0 赋能酒店点评数字化转型
        </p>
        <button
          onclick="document.getElementById('main-scroll').scrollTop = 0"
          class="px-8 py-4 bg-white text-blue-600 rounded-full font-bold hover:shadow-xl transition-all"
        >
          回到顶部
        </button>
      </section>
    </div>

    <script>
      // 简单的交互逻辑
      console.log("PRISM Presentation Loaded Successfully.");
    </script>
  </body>
</html>
